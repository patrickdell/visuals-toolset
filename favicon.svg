<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#18181b"/>

  <!-- Outer frame (crop border) -->
  <rect x="4" y="7" width="24" height="18" rx="1.5"
        fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Rule-of-thirds grid lines -->
  <line x1="12" y1="7"  x2="12" y2="25" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="20" y1="7"  x2="20" y2="25" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="4"  y1="13" x2="28" y2="13" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="4"  y1="19" x2="28" y2="19" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Corner handles -->
  <rect x="2.5"  y="5.5"  width="3" height="3" rx="0.5" fill="#6366f1"/>
  <rect x="26.5" y="5.5"  width="3" height="3" rx="0.5" fill="#6366f1"/>
  <rect x="2.5"  y="23.5" width="3" height="3" rx="0.5" fill="#6366f1"/>
  <rect x="26.5" y="23.5" width="3" height="3" rx="0.5" fill="#6366f1"/>
</svg>
