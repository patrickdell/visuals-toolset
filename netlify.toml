[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/"
  to   = "/v2/index.html"
  status = 200

[[redirects]]
  from = "/v1"
  to   = "/v1/index.html"
  status = 200

[[redirects]]
  from = "/v2"
  to   = "/v2/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
