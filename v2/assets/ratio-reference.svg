<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 240" role="img" aria-label="Mobile aspect ratio shapes reference">
  <style>
    text { font-family: system-ui, -apple-system, Helvetica, Arial, sans-serif; }
    .label-ratio { font-size: 13px; font-weight: 700; fill: #e8eefc; text-anchor: middle; }
    .label-desc  { font-size: 10px; fill: #9fb0d1; text-anchor: middle; }
  </style>

  <!-- Phone 1: 3:2 -->
  <!-- crop: w=78, h=52, crop_y=69 -->
  <g transform="translate(10,10)">
    <rect width="90" height="170" rx="12" fill="#252a36"/>
    <rect x="6" y="22" width="78" height="138" fill="#0f1115"/>
    <!-- camera pill -->
    <rect x="33" y="13" width="24" height="6" rx="3" fill="#0f1115"/>
    <!-- crop overlay -->
    <rect x="6" y="59" width="78" height="52" fill="rgba(218,22,31,0.18)" stroke="#DA161F" stroke-width="1.5"/>
    <text class="label-ratio" x="45" y="192">3:2</text>
    <text class="label-desc" x="45" y="206">Standard landscape</text>
    <text class="label-desc" x="45" y="218">classic photo</text>
  </g>

  <!-- Phone 2: 4:3 -->
  <!-- crop: w=78, h=59, crop_y=56 -->
  <g transform="translate(110,10)">
    <rect width="90" height="170" rx="12" fill="#252a36"/>
    <rect x="6" y="22" width="78" height="138" fill="#0f1115"/>
    <rect x="33" y="13" width="24" height="6" rx="3" fill="#0f1115"/>
    <!-- crop overlay -->
    <rect x="6" y="52" width="78" height="58" fill="rgba(218,22,31,0.18)" stroke="#DA161F" stroke-width="1.5"/>
    <text class="label-ratio" x="45" y="192">4:3</text>
    <text class="label-desc" x="45" y="206">Horizontal rectangle,</text>
    <text class="label-desc" x="45" y="218">slightly taller than 3:2</text>
  </g>

  <!-- Phone 3: 1:1 -->
  <!-- crop: w=78, h=78, crop_y=52 -->
  <g transform="translate(210,10)">
    <rect width="90" height="170" rx="12" fill="#252a36"/>
    <rect x="6" y="22" width="78" height="138" fill="#0f1115"/>
    <rect x="33" y="13" width="24" height="6" rx="3" fill="#0f1115"/>
    <!-- crop overlay -->
    <rect x="6" y="53" width="78" height="78" fill="rgba(218,22,31,0.18)" stroke="#DA161F" stroke-width="1.5"/>
    <text class="label-ratio" x="45" y="192">1:1</text>
    <text class="label-desc" x="45" y="206">Square</text>
    <text class="label-desc" x="45" y="218">&nbsp;</text>
  </g>

  <!-- Phone 4: 4:5 -->
  <!-- crop: w=78, h=98, crop_y=43 -->
  <g transform="translate(310,10)">
    <rect width="90" height="170" rx="12" fill="#252a36"/>
    <rect x="6" y="22" width="78" height="138" fill="#0f1115"/>
    <rect x="33" y="13" width="24" height="6" rx="3" fill="#0f1115"/>
    <!-- crop overlay -->
    <rect x="6" y="43" width="78" height="98" fill="rgba(218,22,31,0.18)" stroke="#DA161F" stroke-width="1.5"/>
    <text class="label-ratio" x="45" y="192">4:5</text>
    <text class="label-desc" x="45" y="206">Vertical rectangle,</text>
    <text class="label-desc" x="45" y="218">popular Instagram shape</text>
  </g>

  <!-- Phone 5: 2:3 -->
  <!-- crop: w=78, h=117, crop_y=34 -->
  <g transform="translate(410,10)">
    <rect width="90" height="170" rx="12" fill="#252a36"/>
    <rect x="6" y="22" width="78" height="138" fill="#0f1115"/>
    <rect x="33" y="13" width="24" height="6" rx="3" fill="#0f1115"/>
    <!-- crop overlay -->
    <rect x="6" y="34" width="78" height="117" fill="rgba(218,22,31,0.18)" stroke="#DA161F" stroke-width="1.5"/>
    <text class="label-ratio" x="45" y="192">2:3</text>
    <text class="label-desc" x="45" y="206">Vertical, tallest</text>
    <text class="label-desc" x="45" y="218">classic photo shape</text>
  </g>
</svg>
